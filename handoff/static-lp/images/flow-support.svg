<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">診断から伴走支援までの流れ</title>
  <desc id="desc">診断、設計、伴走の3段階で構成した支援フロー図です。</desc>
  <rect width="1600" height="900" rx="60" fill="#0b2731" />
  <path d="M200 450h1200" stroke="#9fe5d2" stroke-width="10" stroke-linecap="round" stroke-dasharray="18 22" />
  <g transform="translate(220 240)">
    <rect width="300" height="420" rx="40" fill="#f7f4ec" fill-opacity="0.1" stroke="#f7f4ec" stroke-opacity="0.18"/>
    <circle cx="150" cy="110" r="74" fill="#d18f2f" fill-opacity="0.88" />
    <text x="150" y="120" text-anchor="middle" font-size="42" fill="#08222d" font-family="sans-serif">01</text>
    <text x="150" y="238" text-anchor="middle" font-size="44" fill="#f7f4ec" font-family="sans-serif">診断</text>
    <text x="150" y="308" text-anchor="middle" font-size="24" fill="#f7f4ec" font-family="sans-serif">現状整理・リスク棚卸し</text>
  </g>
  <g transform="translate(650 240)">
    <rect width="300" height="420" rx="40" fill="#f7f4ec" fill-opacity="0.1" stroke="#f7f4ec" stroke-opacity="0.18"/>
    <circle cx="150" cy="110" r="74" fill="#9fe5d2" fill-opacity="0.88" />
    <text x="150" y="120" text-anchor="middle" font-size="42" fill="#08222d" font-family="sans-serif">02</text>
    <text x="150" y="238" text-anchor="middle" font-size="44" fill="#f7f4ec" font-family="sans-serif">設計</text>
    <text x="150" y="308" text-anchor="middle" font-size="24" fill="#f7f4ec" font-family="sans-serif">研究・AI・訴求を組み立てる</text>
  </g>
  <g transform="translate(1080 240)">
    <rect width="300" height="420" rx="40" fill="#f7f4ec" fill-opacity="0.1" stroke="#f7f4ec" stroke-opacity="0.18"/>
    <circle cx="150" cy="110" r="74" fill="#f7f4ec" fill-opacity="0.88" />
    <text x="150" y="120" text-anchor="middle" font-size="42" fill="#08222d" font-family="sans-serif">03</text>
    <text x="150" y="238" text-anchor="middle" font-size="44" fill="#f7f4ec" font-family="sans-serif">伴走</text>
    <text x="150" y="308" text-anchor="middle" font-size="24" fill="#f7f4ec" font-family="sans-serif">定例・レビュー・改善運用</text>
  </g>
